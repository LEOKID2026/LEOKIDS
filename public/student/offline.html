<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#c9f4ff" />
  <title>אין חיבור — LEO K</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050816;
      color: #fff;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      max-width: 22rem;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      box-shadow: 0 0 40px rgba(201, 244, 255, 0.2);
    }

    .app-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #c9f4ff;
      opacity: 0.65;
    }

    .offline-emoji {
      font-size: 3rem;
      line-height: 1;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .sub {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.65;
      max-width: 18rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background: linear-gradient(135deg, #2dd4bf, #0ea5e9);
      color: #050816;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      border-radius: 1rem;
      padding: 0.85rem 2rem;
      width: 100%;
      box-shadow: 0 4px 20px rgba(45, 212, 191, 0.3);
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/child/pwa-192x192.png" alt="LEO K" class="icon" />
    <p class="app-name">LEO K</p>
    <div class="offline-emoji">🔌</div>
    <h1 class="title">אין חיבור לאינטרנט</h1>
    <p class="sub">ניתן לשחק במשחקים הבאים גם בלי אינטרנט</p>
    <a href="/student/offline" class="btn">🎮 משחקים ללא אינטרנט</a>
  </div>
</body>
</html>
